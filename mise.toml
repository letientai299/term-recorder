[tools]
bun = "latest"
tmux = "latest"
"github:asciinema/asciinema" = "latest"
"github:asciinema/agg" = "latest"
prek = "latest"

[tasks.test]
run = "bun test -- src/*.test.ts"
description = "Unit tests only"

[tasks.e2e]
run = "bun test -- src/*.spec.ts"
description = "End-to-end tests (requires tmux)"

[tasks."test:all"]
run = "bun test"
description = "All tests (unit + e2e)"

[tasks.build]
run = "bun run build"
description = "Compile TypeScript to dist/"

[tasks.lint]
run = [
  "bun tsc --noEmit",
  "bun tsc --noEmit --project tsconfig.build.json",
  "bunx biome check --write --unsafe .",
]
description = "Lint and auto-fix"

[tasks.fmt]
run = "bunx prettier --write ."
description = "Format code and docs with Prettier"

[tasks.clean]
run = "rm -rf casts dist"
description = "Remove recorded casts and build output"

[tasks.record]
run = "for f in examples/*.ts; do bun \"$f\" --headless & done; wait"
sources = ['src/**/*.ts', 'examples/**/*.ts']
outputs = ['casts/*.cast']
description = "Record all examples in parallel (headless)"

[tasks.gif]
run = "bun scripts/cast-to-gif.ts"
sources = ['casts/*.cast']
outputs = ['casts/*.gif']
description = "Convert all casts to GIFs using agg with FiraCode Nerd Font"

[tasks."record:ui"]
run = "for f in examples/*.ts; do bun \"$f\"; done"
sources = ['src/**/*.ts', 'examples/**/*.ts']
outputs = ['casts/*.cast']
description = "Run all examples sequentially (headful)"
