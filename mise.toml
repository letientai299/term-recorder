[tools]
bun = "latest"

[tasks.lint]
run = "bunx biome check --write ."
description = "Lint and auto-fix"

[tasks.fmt]
run = "bunx prettier --write ."
description = "Format code and docs with Prettier"

[tasks.record]
run = "bun examples/main.ts {{arg(name=\"flags\", var=true)}}"
description = "Record demos (pass --headless, --filter, etc.)"
